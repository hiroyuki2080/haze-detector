<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1208">
<title>ハゼ検知器</title>
<style>
  :root {
    --bg:        #1a1208;
    --surface:   #251a0c;
    --border:    #3d2e18;
    --text:      #f0e6d0;
    --muted:     #8a7560;
    --green:     #4caf82;
    --red:       #d4603a;
    --amber:     #c8922a;
    --font:      'Helvetica Neue', Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 1rem;
  }
  header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  header .icon { font-size: 28px; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.02em; }
  header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  #status-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  #status-badge.active { background: #0d2e1e; color: var(--green); border-color: var(--green); }

  .counts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .count-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .count-card .label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .count-card .number { font-size: 36px; font-weight: 300; letter-spacing: -0.02em; }
  .count-card.haze1 .number { color: var(--amber); }
  .count-card.haze2 .number { color: var(--red); }
  .count-card .unit { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .panel-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  canvas#waveform {
    width: 100%;
    height: 90px;
    display: block;
    border-radius: 6px;
    background: var(--bg);
  }

  .meter-wrap { position: relative; height: 18px; background: var(--bg); border-radius: 4px; overflow: visible; }
  #peak-bar { height: 100%; width: 0%; background: var(--green); border-radius: 4px; transition: width 0.04s; }
  #threshold-marker {
    position: absolute; top: -3px; width: 2px; height: 24px;
    background: var(--red); border-radius: 1px;
  }
  .meter-labels { display: flex; justify-content: space-between; margin-top: 5px; }
  .meter-labels span { font-size: 10px; color: var(--muted); }
  #thresh-label { color: var(--red); }

  .params { display: flex; flex-direction: column; gap: 14px; }
  .param-row {}
  .param-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .param-top label { font-size: 13px; color: var(--text); }
  .param-top span  { font-size: 13px; font-weight: 500; color: var(--amber); }
  input[type=range] {
    width: 100%; accent-color: var(--amber);
    height: 4px; cursor: pointer;
  }

  #log {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted);
    max-height: 90px;
    overflow-y: auto;
    line-height: 1.6;
  }
  #log .ev1 { color: var(--amber); }
  #log .ev2 { color: var(--red); }
  #log .err { color: #e05050; }

  .buttons { display: flex; gap: 8px; margin-top: 1rem; }
  button {
    flex: 1; padding: 12px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover:not(:disabled) { background: var(--border); }
  button:disabled { opacity: 0.35; cursor: default; }
  #start-btn { border-color: var(--green); color: var(--green); }
  #start-btn:hover:not(:disabled) { background: #0d2e1e; }
  #stop-btn  { border-color: var(--red);   color: var(--red);   }
  #stop-btn:hover:not(:disabled)  { background: #2e150d; }
  #reset-btn { flex: 0 0 48px; }

  footer { text-align: center; margin-top: 1.5rem; font-size: 10px; color: var(--border); }
</style>
</head>
<body>

<header>
  <div class="icon">☕</div>
  <div>
    <h1>ハゼ検知器</h1>
    <p>10kHz帯域 音圧リアルタイム解析</p>
  </div>
  <div id="elapsed-badge" style="font-size:12px; padding:4px 10px; border-radius:20px; background:#251a0c; color:#8a7560; border:1px solid #3d2e18; font-family:'Courier New',monospace;">0:00</div>
  <div id="status-badge">待機中</div>
</header>

<div class="counts">
  <div class="count-card haze1">
    <div class="label">1 ハゼ</div>
    <div class="number" id="c1">0</div>
    <div class="unit">回</div>
  </div>
  <div class="count-card haze2">
    <div class="label">2 ハゼ</div>
    <div class="number" id="c2">0</div>
    <div class="unit">回</div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">BPFフィルター後 波形</div>
  <canvas id="waveform" width="340" height="90"></canvas>
</div>

<div class="panel">
  <div class="panel-title">ピークレベル</div>
  <div class="meter-wrap">
    <div id="peak-bar"></div>
    <div id="threshold-marker"></div>
  </div>
  <div class="meter-labels">
    <span>0 mV</span>
    <span id="thresh-label">閾値: 274 mV</span>
    <span>1000 mV</span>
  </div>
</div>

<div class="panel">
  <div class="panel-title">パラメータ</div>
  <div class="params">
    <div class="param-row">
      <div class="param-top">
        <label>中心周波数</label>
        <span id="freq-out">10.0 kHz</span>
      </div>
      <input type="range" id="freq" min="8000" max="12000" step="100" value="10000">
    </div>
    <div class="param-row">
      <div class="param-top">
        <label>Q値（鋭さ）</label>
        <span id="q-out">20</span>
      </div>
      <input type="range" id="qval" min="5" max="50" step="1" value="20">
      <!-- Q=20: 半値幅0.5kHz / Q=10: 半値幅1kHz / Q=5: 半値幅2kHz -->
    </div>
    <div class="param-row">
      <div class="param-top">
        <label>検知閾値</label>
        <span id="thresh-out">274 mV</span>
      </div>
      <input type="range" id="thresh" min="50" max="800" step="1" value="274">
    </div>
    <div class="param-row">
      <div class="param-top">
        <label>入力ゲイン</label>
        <span id="gain-out">+0 dB</span>
      </div>
      <input type="range" id="gaindb" min="0" max="50" step="1" value="0">
    </div>
    <div class="param-row">
      <div class="param-top">
        <label>閾値学習タイミング</label>
        <span id="phase1-out">開始 0秒 〜 60秒</span>
      </div>
      <input type="range" id="phase1start" min="0" max="1500" step="10" value="0">
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">ログ</div>
  <div id="log">システム待機中...<br></div>
</div>

<div class="buttons">
  <button id="start-btn" onclick="startDetection()">▶ 開始</button>
  <button id="stop-btn"  onclick="stopDetection()" disabled>⏸ 停止</button>
  <button id="reset-btn" onclick="resetCounts()">↺</button>
</div>

<footer>特許第6211223号</footer>

<script>
let audioCtx, stream, source, bpf, gainNode, analyser, rafId;
let running = false;
let haze1 = 0, haze2 = 0;
let threshold = 274;   // 手動閾値（フェーズ1まで使用）
let lastHazeTime = 0;
let popHistory = [];
let haze1Phase = false, haze2Phase = false;
let waveSnap = new Float32Array(256).fill(0);

// =====================================================
// アダプティブ閾値＋スパイク判定（特許アルゴリズム）
// =====================================================
const SAMPLE_RATE   = 48000;
// リングバッファ：直近3ms分のピーク値を記録
// Web Audio APIのループ間隔は約11ms（fftSize=512/48000）
// 3ms = 約0.27フレーム → フレーム単位で近似
const RING_SIZE     = 64;          // 約64フレーム分（約0.7秒）
let ringBuf         = new Float32Array(RING_SIZE).fill(0);
let ringIdx         = 0;

// 60秒間のピーク値履歴（アダプティブ閾値計算用）
const AVG_WINDOW_MS = 60000;
let peakHistory60   = [];          // { t, mv } の配列
let adaptThreshold  = -1;          // -1 = まだ学習中
let elapsedSec      = 0;           // 開始からの経過秒
let startTime       = 0;
let lastSecTick     = 0;
let phase1Start     = 0;           // フェーズ1開始秒（可変・0〜1500）
let phase1End       = 60;          // フェーズ1終了秒 = phase1Start + 60

const canvas = document.getElementById('waveform');
const ctx2d  = canvas.getContext('2d');

// --- 秒数を「分:秒」表記に変換 ---
function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + String(s).padStart(2, '0');
}

// --- パラメータ更新 ---
function updateParams() {
  const f = +document.getElementById('freq').value;
  const q = +document.getElementById('qval').value;
  threshold = +document.getElementById('thresh').value;
  document.getElementById('freq-out').textContent    = (f/1000).toFixed(1) + ' kHz';
  document.getElementById('q-out').textContent       = q + '  （半値幅' + (f/q/1000).toFixed(2) + 'kHz）';
  document.getElementById('thresh-out').textContent  = threshold + ' mV';
  document.getElementById('thresh-label').textContent= '閾値: ' + threshold + ' mV';
  document.getElementById('threshold-marker').style.left = (threshold/1000*100) + '%';
  if (bpf) { bpf.frequency.value = f; bpf.Q.value = q; }
  const db = +document.getElementById('gaindb').value;
  document.getElementById('gain-out').textContent = (db > 0 ? '+' : '') + db + ' dB';
  if (gainNode) gainNode.gain.value = Math.pow(10, db / 20);

  phase1Start = +document.getElementById('phase1start').value;
  phase1End   = phase1Start + 60;
  document.getElementById('phase1-out').textContent =
    '開始 ' + fmtTime(phase1Start) + ' 〜 ' + fmtTime(phase1End);
}
['freq','qval','thresh','gaindb','phase1start'].forEach(id =>
  document.getElementById(id).addEventListener('input', updateParams));
updateParams();

// --- ログ ---
function log(msg, cls='') {
  const box = document.getElementById('log');
  const t = new Date().toLocaleTimeString('ja-JP');
  box.innerHTML += `<span class="${cls}">${t} ${msg}</span><br>`;
  box.scrollTop = box.scrollHeight;
}

// --- 波形描画 ---
function drawWave() {
  const w = canvas.width, h = canvas.height;
  ctx2d.fillStyle = '#1a1208';
  ctx2d.fillRect(0, 0, w, h);
  ctx2d.strokeStyle = '#3d2e18';
  ctx2d.lineWidth = 1;
  ctx2d.setLineDash([4,4]);
  ctx2d.beginPath(); ctx2d.moveTo(0,h/2); ctx2d.lineTo(w,h/2); ctx2d.stroke();
  ctx2d.setLineDash([]);
  ctx2d.strokeStyle = '#4caf82';
  ctx2d.lineWidth = 1.5;
  ctx2d.beginPath();
  const step = w / waveSnap.length;
  for (let i = 0; i < waveSnap.length; i++) {
    const x = i * step;
    const y = h/2 - waveSnap[i] * h * 1.8;
    i === 0 ? ctx2d.moveTo(x,y) : ctx2d.lineTo(x,y);
  }
  ctx2d.stroke();
}
drawWave();

// --- ビープ ---
function beep(freq, dur) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur/1000);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur/1000);
}

// --- 開始 ---
async function startDetection() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    source   = audioCtx.createMediaStreamSource(stream);
    gainNode = audioCtx.createGain();
    gainNode.gain.value = Math.pow(10, +document.getElementById('gaindb').value / 20);
    bpf      = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = +document.getElementById('freq').value;
    bpf.Q.value         = +document.getElementById('qval').value;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.0;  // スパイク検出のためスムージングなし
    source.connect(gainNode); gainNode.connect(bpf); bpf.connect(analyser);

    // 状態初期化
    running       = true;
    startTime     = Date.now();
    lastSecTick   = startTime;
    elapsedSec    = 0;
    adaptThreshold= -1;
    peakHistory60 = [];
    ringBuf.fill(0);
    ringIdx = 0;

    document.getElementById('start-btn').disabled = true;
    document.getElementById('stop-btn').disabled  = false;
    const badge = document.getElementById('status-badge');
    badge.className = 'active';
    if (phase1Start === 0) {
      badge.textContent = '学習中';
      log('開始 — ' + fmtTime(phase1End) + 'まで閾値を学習します', 'ev1');
    } else {
      badge.textContent = '待機中';
      log('開始 — ' + fmtTime(phase1Start) + '後から閾値学習を行います');
    }
    loop();
  } catch(e) {
    log('エラー: ' + e.message, 'err');
  }
}

// --- メインループ ---
function loop() {
  if (!running) return;

  const buf = new Float32Array(analyser.frequencyBinCount);
  analyser.getFloatTimeDomainData(buf);
  waveSnap = buf.slice(0, 256);

  // 現フレームのピーク値（mV）
  let peak = 0;
  for (let i = 0; i < buf.length; i++) {
    const a = Math.abs(buf[i]);
    if (a > peak) peak = a;
  }
  const peakMv = Math.round(peak * 1000);

  // リングバッファに記録
  ringBuf[ringIdx % RING_SIZE] = peakMv;
  ringIdx++;

  // ピークメーター表示
  const effectiveThresh = adaptThreshold > 0 ? adaptThreshold : threshold;
  const pct = Math.min(100, peakMv / 10);
  const bar = document.getElementById('peak-bar');
  bar.style.width = pct + '%';
  bar.style.background = peakMv > effectiveThresh ? '#d4603a' : '#4caf82';

  // 経過時間更新（1秒ごと）
  const now = Date.now();
  if (now - lastSecTick >= 1000) {
    elapsedSec++;
    lastSecTick = now;
    document.getElementById('elapsed-badge').textContent = fmtTime(elapsedSec);

    // 60秒間ピーク履歴に追加
    peakHistory60.push({ t: now, mv: peakMv });
    peakHistory60 = peakHistory60.filter(p => now - p.t <= AVG_WINDOW_MS);

    // フェーズ1（phase1Start〜phase1End秒）：アダプティブ閾値を学習
    if (elapsedSec >= phase1Start && elapsedSec <= phase1End) {
      const avg = peakHistory60.reduce((s,p) => s + p.mv, 0) / peakHistory60.length;
      adaptThreshold = Math.round(avg);
      document.getElementById('thresh-label').textContent =
        '適応閾値: ' + adaptThreshold + ' mV（平均:' + Math.round(avg) + '）';
      document.getElementById('threshold-marker').style.left =
        Math.min(100, adaptThreshold / 10) + '%';
      if (elapsedSec === phase1Start) {
        log('フェーズ1：閾値学習開始（' + fmtTime(phase1Start) + '〜' + fmtTime(phase1End) + '）', 'ev1');
        document.getElementById('status-badge').textContent = '学習中';
      }
    }

    // フェーズ2（phase1End+1秒〜）：ハゼ検知モード
    if (elapsedSec === phase1End + 1) {
      log('フェーズ2：ハゼ検知開始 閾値=' + adaptThreshold + 'mV', 'ev1');
      document.getElementById('status-badge').textContent = '検知中';
    }
  }

  // =====================================================
  // ハゼ判定（フェーズ2以降 または 手動テスト時）
  // =====================================================
  const activeThresh = adaptThreshold > 0 ? adaptThreshold : threshold;
  const inDetectPhase = (adaptThreshold > 0 && elapsedSec >= phase1End + 1) || adaptThreshold < 0;

  if (inDetectPhase && peakMv > activeThresh && (now - lastHazeTime) > 250) {

    // --- スパイク判定（特許アルゴリズム） ---
    // 検知時点の -0.5ms〜-3ms（約2〜14フレーム前）の最大値を調べる
    // フレーム間隔 = 512samples / 48000Hz ≈ 10.67ms
    // -0.5ms ≈ 0.05フレーム → 1フレーム前
    // -3.0ms ≈ 0.28フレーム → 1〜3フレーム前 を確認
    const checkFrames = 3;  // 約3フレーム前まで（≒32ms）
    let prePeak = 0;
    for (let k = 1; k <= checkFrames; k++) {
      const idx = ((ringIdx - 1 - k) + RING_SIZE * 4) % RING_SIZE;
      if (ringBuf[idx] > prePeak) prePeak = ringBuf[idx];
    }

    // 直前に「閾値の1/4以上」の電圧がなければハゼ（突発スパイク）
    const noiseFloor = activeThresh / 4;
    const isHaze = prePeak < noiseFloor;

    if (isHaze) {
      lastHazeTime = now;
      popHistory.push(now);
      popHistory = popHistory.filter(t => now - t < 30000);
      const rate = popHistory.length;

      if (rate <= 15) {
        haze1++;
        document.getElementById('c1').textContent = haze1;
        if (!haze1Phase) {
          haze1Phase = true;
          log('🟡 1ハゼ開始 ' + peakMv + 'mV レート:' + rate, 'ev1');
          beep(880, 100);
        } else beep(660, 60);
      } else {
        haze2++;
        document.getElementById('c2').textContent = haze2;
        if (!haze2Phase) {
          haze2Phase = true;
          log('🔴 2ハゼ開始 ' + peakMv + 'mV レート:' + rate, 'ev2');
          beep(1320, 80);
        } else beep(1100, 50);
      }
    } else {
      // ノイズとして除外（ログに小さく記録）
      log('— ノイズ除外 ' + peakMv + 'mV（直前:' + prePeak + 'mV）');
    }
  }

  drawWave();
  rafId = requestAnimationFrame(loop);
}

// --- 停止 ---
function stopDetection() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  audioCtx = null;
  document.getElementById('start-btn').disabled = false;
  document.getElementById('stop-btn').disabled  = true;
  const badge = document.getElementById('status-badge');
  badge.textContent = '停止'; badge.className = '';
  log('停止 — 1ハゼ:' + haze1 + '回  2ハゼ:' + haze2 + '回');
}

// --- リセット ---
function resetCounts() {
  haze1 = 0; haze2 = 0;
  haze1Phase = false; haze2Phase = false;
  popHistory = []; peakHistory60 = [];
  adaptThreshold = -1; elapsedSec = 0;
  ringBuf.fill(0); ringIdx = 0;
  document.getElementById('c1').textContent = '0';
  document.getElementById('c2').textContent = '0';
  document.getElementById('thresh-label').textContent = '閾値: ' + threshold + ' mV';
  document.getElementById('elapsed-badge').textContent = '0:00';
  log('カウントリセット');
}
</script>
</body>
</html>
